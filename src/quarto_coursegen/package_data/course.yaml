course:
  id: my-course
  title: "My Course"
  subtitle: "A subtitle for my course"
  semester: "WS 2026"
  language: "en"        # en | de — controls i18n strings in generated stubs
  ects: 3

  instructors:
    - name: "Prof. Jane Smith"
      email: "jane.smith@university.edu"
      role: "lecturer"          # lecturer | tutor | coordinator

  organization:
    institution: "My University"
    department: "Department of Something"
    institute: "Institute of Something"

  defaults:
    status: planned        # planned | draft | review | published | archived
    visibility: public     # public | internal | hidden
    duration: 90           # minutes

  schedule:
    start_date: 2026-10-01
    end_date: 2027-01-31
    weekly_day: "Monday"

# Course-level artifacts (e.g. syllabus, a course overview deck)
artifacts:
  - id: syllabus
    type: syllabus
    enabled: true
    file: "content/syllabus.qmd"

modules:
  - id: intro
    type: lecture
    title: "Introduction"
    subtitle: "Getting started"
    description: >
      Overview of the course, its goals, and the assessment format.
    date: 2026-10-06
    status: published
    visibility: public

    learning_objectives: |
      - Understand the scope and goals of the course
      - Know the assessment format and grading criteria

    artifacts:
      - id: intro-slides
        type: slides
        enabled: true
        status: published
        output_formats: [revealjs, beamer]
      - id: intro-handout
        type: handout
        enabled: true
        status: published
        output_formats: [website, pdf]
      - id: intro-notes
        type: notes
        enabled: true
        status: published
        output_formats: [pdf]

    lms:
      release: 2026-10-01
      due: null

    dependencies: []

  - id: topic-a
    type: lecture
    title: "Topic A"
    subtitle: "Core concepts"
    description: >
      Introduction to the core concepts and methods of the field.
    date: 2026-10-13
    status: published
    visibility: public

    learning_objectives: |
      - Explain the fundamental concepts of Topic A
      - Apply the basic methods to simple examples

    artifacts:
      - id: topic-a-slides
        type: slides
        enabled: true
        status: published
        output_formats: [revealjs, beamer]
      - id: topic-a-handout
        type: handout
        enabled: true
        status: published
        output_formats: [website, pdf]
      - id: topic-a-assignment
        type: assignment
        enabled: true
        status: published
        output_formats: [website, pdf]

    lms:
      release: 2026-10-10
      due: 2026-10-20

    dependencies: [intro]

  - id: topic-b
    type: exercise
    title: "Topic B — Practice Session"
    subtitle: "Hands-on exercises"
    description: >
      Guided practice applying the concepts from Topic A to real-world examples.
    date: 2026-10-20
    status: planned
    visibility: public

    learning_objectives: |
      - Solve applied problems using the methods from Topic A
      - Reflect on limitations and open questions

    artifacts:
      - id: topic-b-slides
        type: slides
        enabled: false          # no slides for exercise sessions
        output_formats: [revealjs]
      - id: topic-b-handout
        type: handout
        enabled: true
        output_formats: [website, pdf]
      - id: topic-b-assignment
        type: assignment
        enabled: true
        output_formats: [website, pdf]

    lms:
      release: 2026-10-17
      due: 2026-10-27

    dependencies: [intro, topic-a]

  # Add more modules below. Each module can have slides, handouts, notes,
  # and assignments. Set enabled: false to skip stub generation for a
  # specific artifact type.
